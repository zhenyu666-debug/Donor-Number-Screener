name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "numpy<2"
          pip install pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Lint with ruff
        run: |
          python -m pip install --quiet ruff
          python -m ruff check src/ tests/

      - name: Build outreach PDFs (regenerable, .gitignore'd)
        env:
          PYTHONPATH: src
        run: |
          python src/12_build_pdf_safe.py

      - name: Generate candidate library (CI subset, 10k mols)
        env:
          PYTHONPATH: src
          CI_MODE: "1"
        run: |
          python src/01_build_library.py

      - name: Run pipeline smoke tests (v2)
        env:
          PYTHONPATH: src
        run: |
          python -m pytest tests/test_pipeline.py -v

      - name: Run v3 tests
        env:
          PYTHONPATH: src
        run: |
          python -m pytest tests/test_v3.py -v

      - name: Run EBM / MCMC / hardware-stochasticity tests
        env:
          PYTHONPATH: src
        run: |
          python -m pytest tests/test_ebm.py -v
