# Re-ranking options used by 32_sse_redn.py
ranking:
  alpha_sigma: 1.0e3         # weight for log10(sigma_ion)
  beta_Eg: 1.0               # weight for E_g
  gamma_floor: 5.0           # base DN before sigma/Eg terms
  delta_migration: -2.0      # penalty for high migration barrier
