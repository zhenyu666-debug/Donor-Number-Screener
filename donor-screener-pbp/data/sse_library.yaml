    name: "Li3PS4 (beta)"
    formula: "Li3PS4"
    class: sulfide
    sigma_ion_S_cm: 1.6e-3
    E_g_eV: 2.5
    E_form_eV: -0.42
    stability_window_V: 5.0
    density_g_cm3: 1.87
