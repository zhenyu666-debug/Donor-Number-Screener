# Solid-state electrolyte library - 14 mainstream SSEs
# Used by src/32_sse_redn.py for DN re-ranking.
#
# Fields:
#   formula         - chemical formula
#   class           - sulfide / oxide / polymer / halide
#   sigma_ion_S_cm  - ionic conductivity at 298 K in S/cm
#   E_g_eV          - electronic band gap
#   E_form_eV       - formation energy per atom (DFT)
#   stability_window_V - electrochemical stability window vs Li/Li+
#   density_g_cm3
#   molar_mass_g_mol
#   li_coord_num    - average Li coordination number (AIMD hint)
#   migration_eV    - Li migration barrier
#   dn_empirical    - empirical DN (computed from sigma_ion + E_g via simple scaling)
#   source          - literature source for the values

sse:
